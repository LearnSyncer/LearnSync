<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/sait1.css">
    <style>
        h1 {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            padding-left: 10px;
            font-size: 56px;
        }

        p {
            font-family: 'Lora', serif;
            font-weight: 800;
            padding-left: 10px;
            font-size: 26px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px; /* Улучшенное уменьшение заголовка */
                text-align: center;
            }

            p {
                font-size: 18px;
                text-align: center;
            }

            .category-button {
                padding: 12px;
                font-size: 16px;
                width: 90%; /* Делаем кнопки шире для удобства */
            }

            .sidebar-tabs {
                width: 100%;
                height: auto;
                flex-direction: row;
                overflow-x: auto;
            }

            .tab-button {
                margin-bottom: 0;
                margin-right: 5px;
                white-space: nowrap;
                font-size: 14px;
            }

            .tab-content {
                margin-top: 10px;
                padding: 10px;
            }

            .square {
                width: 100%;
                height: auto;
                font-size: 20px;
                padding: 10px;
            }

            .parallax {
                height: 25vh;
            }
        }
    </style>
</head>
<body>
    <div id="category-page" class="category-page">
        <div class="category-box">
            <h1>Виберіть категорію</h1>
            <button id="teacher-btn" class="category-button">Вчитель</button>
            <button id="student-btn" class="category-button">Учень</button>
            <button id="parent-btn" class="category-button">Батьки</button>
        </div>
    </div>

    <div id="main-page" class="main-page" style="display: none; flex-direction: column; align-items: center;">
        <div class="sidebar-tabs">
            <button class="tab-button active" data-tab="tab1">Ознайомство</button>
            <button class="tab-button" data-tab="tab2">Розклад</button>
            <button class="tab-button" data-tab="tab3">Список подій</button>
            <button class="tab-button" data-tab="tab4">Тест</button>
        </div>
        
        <div class="tab-content">
            <div class="square">
                <h1>LearnSync</h1>
            </div>
            
            <div id="tab1" class="tab-pane active">
                <div class="parallax"></div>
            </div>        
            <div class="text">
                <h1>LearnSync</h1>
                <p>Інноваційна платформа для ефективного управління навчальним процесом.</p>
            </div>
            <div id="tab2" class="tab-pane">
                <h1>Контент Вкладки 2</h1>
                <p>2</p>
            </div>
            <div id="tab3" class="tab-pane">
                <h1>Контент Вкладки 3</h1>
                <p>3</p>
            </div>
            <div id="tab4" class="tab-pane">
                <h1>Контент Вкладки 4</h1>
                <p>4</p>
            </div>        
        </div>
    </div>

    <script src="js/sait1.js"></script>
</body>
</html>
