<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/sait1.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            font-size: 16px;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 28px;
            text-align: center;
        }

        p {
            font-family: 'Lora', serif;
            font-weight: 400;
            font-size: 16px;
            text-align: center;
            max-width: 90%;
        }

        .category-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .category-button {
            width: 90%;
            max-width: 300px;
            padding: 10px;
            font-size: 14px;
            margin: 5px 0;
        }

        .sidebar-tabs {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            white-space: nowrap;
        }

        .tab-button {
            font-size: 14px;
            padding: 8px;
        }

        .tab-content {
            width: 100%;
            max-width: 800px;
            padding: 10px;
        }

        .square {
            width: 90%;
            max-width: 400px;
            font-size: 18px;
            padding: 10px;
            text-align: center;
        }

        .parallax {
            height: 20vh;
        }
    </style>
</head>
<body>
    <div id="category-page" class="category-page">
        <div class="category-box">
            <h1>Виберіть категорію</h1>
            <button id="teacher-btn" class="category-button">Вчитель</button>
            <button id="student-btn" class="category-button">Учень</button>
            <button id="parent-btn" class="category-button">Батьки</button>
        </div>
    </div>

    <div id="main-page" class="main-page" style="display: none;">
        <div class="sidebar-tabs">
            <button class="tab-button active" data-tab="tab1">Ознайомство</button>
            <button class="tab-button" data-tab="tab2">Розклад</button>
            <button class="tab-button" data-tab="tab3">Список подій</button>
            <button class="tab-button" data-tab="tab4">Тест</button>
        </div>
        
        <div class="tab-content">
            <div class="square">
                <h1>LearnSync</h1>
            </div>
            
            <div id="tab1" class="tab-pane active">
                <div class="parallax"></div>
            </div>        
            <div class="text">
                <h1>LearnSync</h1>
                <p>Інноваційна платформа для ефективного управління навчальним процесом.</p>
            </div>
            <div id="tab2" class="tab-pane">
                <h1>Контент Вкладки 2</h1>
                <p>2</p>
            </div>
            <div id="tab3" class="tab-pane">
                <h1>Контент Вкладки 3</h1>
                <p>3</p>
            </div>
            <div id="tab4" class="tab-pane">
                <h1>Контент Вкладки 4</h1>
                <p>4</p>
            </div>        
        </div>
    </div>

    <script src="js/sait1.js"></script>
</body>
</html>
